<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>กำลังเปิดหน้าต่างแชร์</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans Thai", sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; box-sizing: border-box; text-align: center; color: #333;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid #eee; border-top-color: #06C755;
    border-radius: 50%; animation: spin 1s linear infinite;
    margin-bottom: 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 15px; color: #444; line-height: 1.5; max-width: 320px; }
  .msg.success { color: #06C755; font-weight: 600; }
  .msg.error { color: #c00; }
</style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div id="msg" class="msg">กำลังเปิดหน้าต่างแชร์...</div>

<script>
/* ============ EDIT THESE ============ */
const LIFF_ID         = 'REPLACE_WITH_YOUR_LIFF_ID';                  // e.g. 1234567890-AbCdEfGh
const APPS_SCRIPT_URL = 'REPLACE_WITH_YOUR_APPS_SCRIPT_EXEC_URL';     // ends with /exec
const ADD_FRIEND_URL  = 'REPLACE_WITH_YOUR_LIN_EE_URL';               // e.g. https://lin.ee/xxxxx
const SHOP_NAME       = 'YOUR_SHOP';
/* ==================================== */

function getParam(k) {
  return new URLSearchParams(location.search).get(k);
}

function setMsg(text, cls) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (cls ? ' ' + cls : '');
}

function hideSpinner() {
  const s = document.getElementById('spinner');
  if (s) s.style.display = 'none';
}

function buildShareFlex() {
  return {
    type: 'flex',
    altText: 'เพื่อนแนะนำ ' + SHOP_NAME,
    contents: {
      type: 'bubble',
      body: {
        type: 'box', layout: 'vertical', spacing: 'md',
        contents: [
          { type: 'text', text: 'เพื่อนแนะนำให้คุณ', size: 'sm', color: '#888888' },
          { type: 'text', text: SHOP_NAME, weight: 'bold', size: 'xxl', color: '#06C755' },
          { type: 'text',
            text: 'เพิ่ม LINE OA ของ ' + SHOP_NAME + ' รับโปรพิเศษและของฟรีที่หน้าบูธ',
            wrap: true, size: 'sm', color: '#555555', margin: 'md' }
        ]
      },
      footer: {
        type: 'box', layout: 'vertical',
        contents: [
          { type: 'button', style: 'primary', color: '#06C755',
            action: { type: 'uri', label: 'เพิ่มเพื่อน', uri: ADD_FRIEND_URL } }
        ]
      }
    }
  };
}

async function pingMarkShare(uid) {
  try {
    await fetch(APPS_SCRIPT_URL + '?act=mark_share&uid=' + encodeURIComponent(uid), { mode: 'no-cors' });
  } catch (e) {
    // no-cors makes errors opaque; ignore
  }
}

async function main() {
  const uid = getParam('uid');
  if (!uid) { hideSpinner(); setMsg('ไม่พบข้อมูลผู้ใช้', 'error'); return; }

  try {
    await liff.init({ liffId: LIFF_ID });
  } catch (e) {
    hideSpinner(); setMsg('เปิด LIFF ไม่สำเร็จ: ' + (e.message || e), 'error');
    return;
  }

  if (!liff.isApiAvailable('shareTargetPicker')) {
    hideSpinner(); setMsg('อุปกรณ์นี้ไม่รองรับการแชร์ กรุณาแชร์ผ่านแอป LINE โดยตรง', 'error');
    return;
  }

  try {
    await liff.shareTargetPicker([ buildShareFlex() ]);
    // Treat any non-throw as success (booth flow is honor system).
    await pingMarkShare(uid);
    hideSpinner();
    setMsg('เรียบร้อย! กลับไปที่ห้องแชทเพื่อรับ Mission Completed', 'success');
    setTimeout(() => { if (liff.isInClient()) liff.closeWindow(); }, 1500);
  } catch (e) {
    hideSpinner();
    setMsg('แชร์ไม่สำเร็จ: ' + (e.message || e), 'error');
  }
}

main();
</script>
</body>
</html>
